<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>대시보드 — CloudPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <style>
    .site-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:16px;transition:border-color .2s}
    .site-card:hover{border-color:var(--border2)}
    .site-icon{width:44px;height:44px;border-radius:10px;background:rgba(249,115,22,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .site-info{flex:1;min-width:0}
    .site-name{font-family:var(--font-head);font-weight:700;font-size:.95rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .site-url{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .site-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
    .btn-icon{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px;cursor:pointer;color:var(--muted);transition:all .2s;display:flex;align-items:center}
    .btn-icon:hover{border-color:var(--border2);color:var(--text)}
    .btn-icon.danger:hover{border-color:rgba(239,68,68,.3);color:var(--error);background:rgba(239,68,68,.05)}
    .sites-list{display:flex;flex-direction:column;gap:10px}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{width:64px;height:64px;border-radius:16px;background:var(--surface2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    /* Delete modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-bg.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:32px;max-width:400px;width:100%}
    .modal h3{font-family:var(--font-head);font-size:1.1rem;margin-bottom:10px}
    .modal p{font-size:.88rem;color:var(--muted);margin-bottom:24px;line-height:1.6}
    .modal-btns{display:flex;gap:10px}
    .btn-cancel{flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.88rem;cursor:pointer;transition:all .2s}
    .btn-danger{flex:1;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:var(--error);font-family:var(--font-body);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-danger:hover{background:rgba(239,68,68,.2)}
    /* cp-toast */
    .cp-toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:500;color:#fff;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:9999;max-width:320px}
    .cp-toast.show{opacity:1;transform:translateY(0)}
    .cp-toast.success{background:#22c55e}.cp-toast.error{background:#ef4444}.cp-toast.info{background:#6366f1}
  </style>
</head>
<body>
<div class="app-wrap">
  <aside class="sidebar" id="sidebar">
    <a href="/dashboard.html" class="sb-logo">
      <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="currentColor" opacity="0.5"/>
        <circle cx="14" cy="14" r="2.2" fill="currentColor"/>
      </svg>
      CloudPress
    </a>
    <nav class="sb-nav">
      <div class="sb-section">
        <div class="sb-label">메인</div>
        <a href="/dashboard.html" class="sb-link active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
          대시보드
        </a>
        <a href="/create.html" class="sb-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          사이트 추가
        </a>
      </div>
      <div class="sb-section">
        <div class="sb-label">계정</div>
        <a href="/account.html" class="sb-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          내 계정
        </a>
        <a href="/pricing.html" class="sb-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 10h20" stroke="currentColor" stroke-width="1.5"/></svg>
          요금제 변경
        </a>
      </div>
      <div class="sb-section">
        <button class="sb-link danger" onclick="CP.logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          로그아웃
        </button>
      </div>
    </nav>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">?</div>
      <div class="sb-uinfo">
        <div class="sb-uname" id="sbName">—</div>
        <div class="sb-uemail" id="sbEmail">—</div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="sidebar-toggle" onclick="openSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <span class="topbar-title">대시보드</span>
      </div>
      <div class="topbar-actions">
        <a href="/create.html" class="btn btn-primary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          새 사이트
        </a>
      </div>
    </div>

    <div class="content">
      <div style="margin-bottom:28px">
        <h1 style="font-family:var(--font-head);font-size:1.4rem;font-weight:700;margin-bottom:4px" id="welcomeMsg">안녕하세요!</h1>
        <p style="color:var(--muted);font-size:.88rem">WordPress 사이트 현황을 확인하세요.</p>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="sc-icon" style="background:rgba(249,115,22,.1)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="#f97316" stroke-width="1.5"/><path d="M8 21h8M12 17v4" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="sc-val" id="statSites">—</div>
          <div class="sc-lbl">WordPress 사이트</div>
        </div>
        <div class="stat-card">
          <div class="sc-icon" style="background:rgba(99,102,241,.1)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="sc-val" id="statPlan">—</div>
          <div class="sc-lbl">현재 플랜</div>
        </div>
        <div class="stat-card">
          <div class="sc-icon" style="background:rgba(34,197,94,.1)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/><polyline points="22 4 12 14.01 9 11.01" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="sc-val" id="statActive">—</div>
          <div class="sc-lbl">활성 사이트</div>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:32px">
        <h2 style="font-family:var(--font-head);font-size:1rem;font-weight:700">내 WordPress 사이트</h2>
        <a href="/create.html" class="btn btn-primary btn-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          새로 만들기
        </a>
      </div>

      <div id="sitesList" class="sites-list">
        <div style="color:var(--muted);font-size:.88rem;padding:20px 0">불러오는 중...</div>
      </div>
    </div>
  </main>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-bg" id="deleteModal">
  <div class="modal">
    <h3>사이트 삭제</h3>
    <p id="deleteModalMsg">이 사이트를 삭제하시겠습니까? WordPress 데이터가 모두 삭제되며 복구할 수 없습니다.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDeleteModal()">취소</button>
      <button class="btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">삭제하기</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
let pendingDeleteId = null;

async function init() {
  const user = await CP.requireAuth();
  if (!user) return;

  document.getElementById('sbAvatar').textContent = user.name[0].toUpperCase();
  document.getElementById('sbName').textContent = user.name;
  document.getElementById('sbEmail').textContent = user.email;
  document.getElementById('welcomeMsg').textContent = `안녕하세요, ${user.name}님!`;

  const plan = CP.planInfo(user.plan);
  document.getElementById('statPlan').textContent = plan.name;

  await loadSites();
}

async function loadSites() {
  const sites = await CP.getSites();

  document.getElementById('statSites').textContent = sites.length;
  const active = sites.filter(s => s.status === 'active').length;
  document.getElementById('statActive').textContent = active;

  const container = document.getElementById('sitesList');

  if (!sites.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <p style="font-weight:600;margin-bottom:6px">아직 WordPress 사이트가 없습니다</p>
        <p style="font-size:.83rem;margin-bottom:20px">지금 바로 첫 번째 사이트를 무료로 개설해보세요.</p>
        <a href="/create.html" class="btn btn-primary btn-sm">새 사이트 만들기</a>
      </div>`;
    return;
  }

  container.innerHTML = sites.map(s => {
    const status = CP.statusBadge(s.status);
    const displayUrl = s.custom_domain
      ? `https://${s.custom_domain}`
      : (s.wp_url || `https://${s.subdomain}.cloudpress.site`);

    return `<div class="site-card" id="card-${s.id}">
      <div class="site-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#f97316" stroke-width="1.5"/><path d="M12 8v8M8 12h8" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="site-info">
        <div class="site-name">${escHtml(s.name)}</div>
        <div class="site-url">${escHtml(displayUrl)}</div>
        <div style="margin-top:5px">
          <span class="badge" style="background:${status.color}18;color:${status.color}">
            <span class="status-dot" style="background:${status.color}"></span>
            ${status.label}
          </span>
          <span style="font-size:.72rem;color:var(--muted);margin-left:8px">${CP.formatDate(s.created_at)}</span>
        </div>
      </div>
      <div class="site-actions">
        ${s.status === 'active' ? `
        <a href="${escHtml(s.wp_admin_url || displayUrl + '/wp-admin')}" target="_blank" class="btn-icon" title="WordPress 관리자">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="15 3 21 3 21 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </a>
        <a href="/site.html?id=${s.id}" class="btn-icon" title="상세 정보">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r=".5" fill="currentColor" stroke="currentColor"/></svg>
        </a>` : ''}
        <button class="btn-icon danger" onclick="openDeleteModal('${s.id}','${escHtml(s.name)}')" title="삭제">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  // provisioning 중인 사이트 폴링
  const provisioning = sites.filter(s => s.status === 'provisioning');
  if (provisioning.length) {
    provisioning.forEach(s => pollStatus(s.id));
  }
}

async function pollStatus(siteId) {
  const poll = async () => {
    const data = await CP.pollSiteStatus(siteId);
    if (!data.ok) return;
    const s = data.site;
    if (s.status === 'active' || s.status === 'error') {
      await loadSites();
      if (s.status === 'active') showToast('WordPress 사이트가 개설되었습니다! 🎉', 'success');
      if (s.status === 'error') showToast('사이트 개설 중 오류가 발생했습니다.', 'error');
    } else {
      setTimeout(poll, 4000);
    }
  };
  setTimeout(poll, 4000);
}

function openDeleteModal(id, name) {
  pendingDeleteId = id;
  document.getElementById('deleteModalMsg').textContent =
    `"${name}" 사이트를 삭제하시겠습니까? WordPress 데이터가 모두 삭제되며 복구할 수 없습니다.`;
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  pendingDeleteId = null;
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  document.getElementById('confirmDeleteBtn').textContent = '삭제 중...';
  document.getElementById('confirmDeleteBtn').disabled = true;

  const res = await CP.deleteSite(pendingDeleteId);
  closeDeleteModal();

  if (res.ok) {
    showToast('사이트가 삭제되었습니다.', 'success');
    await loadSites();
  } else {
    showToast(res.error || '삭제 중 오류가 발생했습니다.', 'error');
  }
}

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

init();
</script>
</body>
</html>
