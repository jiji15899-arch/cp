<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>내 계정 — CloudPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <style>
    .section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px;max-width:560px}
    .section-title{font-family:var(--font-head);font-size:.95rem;font-weight:700;margin-bottom:18px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.82rem;font-weight:500;color:var(--muted);margin-bottom:6px}
    .field input{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.9rem;outline:none;transition:border-color .2s}
    .field input:focus{border-color:var(--accent)}
    .field input:disabled{opacity:.5;cursor:not-allowed}
    .plan-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700}
    .cp-toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:500;color:#fff;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:9999;max-width:320px}
    .cp-toast.show{opacity:1;transform:translateY(0)}
    .cp-toast.success{background:#22c55e}.cp-toast.error{background:#ef4444}.cp-toast.info{background:#6366f1}
  </style>
</head>
<body>
<div class="app-wrap">
  <aside class="sidebar" id="sidebar">
    <a href="/dashboard.html" class="sb-logo">
      <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="currentColor" opacity="0.5"/>
        <circle cx="14" cy="14" r="2.2" fill="currentColor"/>
      </svg>
      CloudPress
    </a>
    <nav class="sb-nav">
      <div class="sb-section">
        <div class="sb-label">메인</div>
        <a href="/dashboard.html" class="sb-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
          대시보드
        </a>
        <a href="/create.html" class="sb-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          사이트 추가
        </a>
      </div>
      <div class="sb-section">
        <div class="sb-label">계정</div>
        <a href="/account.html" class="sb-link active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          내 계정
        </a>
        <a href="/pricing.html" class="sb-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 10h20" stroke="currentColor" stroke-width="1.5"/></svg>
          요금제 변경
        </a>
      </div>
      <div class="sb-section">
        <button class="sb-link danger" onclick="CP.logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          로그아웃
        </button>
      </div>
    </nav>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">?</div>
      <div class="sb-uinfo">
        <div class="sb-uname" id="sbName">—</div>
        <div class="sb-uemail" id="sbEmail">—</div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="sidebar-toggle" onclick="openSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <span class="topbar-title">내 계정</span>
      </div>
    </div>

    <div class="content">
      <div style="margin-bottom:24px">
        <h1 style="font-family:var(--font-head);font-size:1.3rem;font-weight:700;margin-bottom:4px">계정 설정</h1>
        <p style="color:var(--muted);font-size:.88rem">프로필 정보와 비밀번호를 관리하세요.</p>
      </div>

      <!-- 프로필 정보 -->
      <div class="section-card">
        <div class="section-title">프로필 정보</div>
        <div class="field">
          <label>이름</label>
          <input type="text" id="profileName" placeholder="이름"/>
        </div>
        <div class="field">
          <label>이메일</label>
          <input type="email" id="profileEmail" disabled/>
        </div>
        <div class="field">
          <label>현재 플랜</label>
          <div id="planDisplay" style="margin-top:2px"></div>
        </div>
        <button class="btn btn-primary btn-sm" id="saveProfileBtn" onclick="saveProfile()">저장</button>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="section-card">
        <div class="section-title">비밀번호 변경</div>
        <div class="field">
          <label>현재 비밀번호</label>
          <input type="password" id="currentPass" placeholder="현재 비밀번호"/>
        </div>
        <div class="field">
          <label>새 비밀번호</label>
          <input type="password" id="newPass" placeholder="새 비밀번호 (6자 이상)"/>
        </div>
        <div class="field">
          <label>새 비밀번호 확인</label>
          <input type="password" id="newPassConfirm" placeholder="새 비밀번호 재입력"/>
        </div>
        <div id="pwErr" style="font-size:.82rem;color:var(--error);margin-bottom:12px;display:none"></div>
        <button class="btn btn-primary btn-sm" id="changePassBtn" onclick="changePassword()">비밀번호 변경</button>
      </div>

      <!-- 계정 정보 -->
      <div class="section-card">
        <div class="section-title">계정 정보</div>
        <div style="font-size:.85rem;color:var(--muted);line-height:1.8">
          <div>가입일: <span id="joinDate" style="color:var(--text);font-weight:500">—</span></div>
          <div>보유 사이트: <span id="siteCount" style="color:var(--text);font-weight:500">—</span>개</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/app.js"></script>
<script>
async function init() {
  const user = await CP.requireAuth();
  if (!user) return;

  const profile = await CP.getProfile();
  if (!profile) return;

  document.getElementById('sbAvatar').textContent = profile.name[0].toUpperCase();
  document.getElementById('sbName').textContent = profile.name;
  document.getElementById('sbEmail').textContent = profile.email;
  document.getElementById('profileName').value = profile.name;
  document.getElementById('profileEmail').value = profile.email;

  const plan = CP.planInfo(profile.plan);
  document.getElementById('planDisplay').innerHTML =
    `<span class="plan-badge" style="background:${plan.color}18;color:${plan.color}">${plan.name} 플랜</span>
     <a href="/pricing.html" style="font-size:.78rem;color:var(--accent);text-decoration:none;margin-left:10px">변경 →</a>`;

  document.getElementById('joinDate').textContent = CP.formatDate(profile.created_at);
  document.getElementById('siteCount').textContent = profile.site_count || 0;
}

async function saveProfile() {
  const name = document.getElementById('profileName').value.trim();
  if (!name) { showToast('이름을 입력해주세요.', 'error'); return; }

  const btn = document.getElementById('saveProfileBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  const res = await CP.updateProfile({ name });
  btn.disabled = false; btn.textContent = '저장';

  if (res.ok) {
    CP.setUser(res.user);
    document.getElementById('sbName').textContent = res.user.name;
    document.getElementById('sbAvatar').textContent = res.user.name[0].toUpperCase();
    showToast('프로필이 저장되었습니다.', 'success');
  } else {
    showToast(res.error || '저장 실패', 'error');
  }
}

async function changePassword() {
  const current = document.getElementById('currentPass').value;
  const newP = document.getElementById('newPass').value;
  const confirm = document.getElementById('newPassConfirm').value;
  const errEl = document.getElementById('pwErr');

  errEl.style.display = 'none';

  if (!current || !newP || !confirm) {
    errEl.textContent = '모든 필드를 입력해주세요.'; errEl.style.display = 'block'; return;
  }
  if (newP.length < 6) {
    errEl.textContent = '새 비밀번호는 6자 이상이어야 합니다.'; errEl.style.display = 'block'; return;
  }
  if (newP !== confirm) {
    errEl.textContent = '새 비밀번호가 일치하지 않습니다.'; errEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('changePassBtn');
  btn.disabled = true; btn.textContent = '변경 중...';

  const res = await CP.updateProfile({ current_password: current, new_password: newP });
  btn.disabled = false; btn.textContent = '비밀번호 변경';

  if (res.ok) {
    document.getElementById('currentPass').value = '';
    document.getElementById('newPass').value = '';
    document.getElementById('newPassConfirm').value = '';
    showToast('비밀번호가 변경되었습니다.', 'success');
  } else {
    errEl.textContent = res.error || '비밀번호 변경 실패';
    errEl.style.display = 'block';
  }
}

init();
</script>
</body>
</html>
