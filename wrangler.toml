name = "cloudpress"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "cloudpress-db"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
INSTAWP_API_KEY = ""
CF_API_TOKEN = ""
CF_ZONE_ID = ""
CF_ACCOUNT_ID = ""
JWT_SECRET = "change-this-to-random-secret-in-dashboard"
SITE_DOMAIN = "cloudpress.site"
